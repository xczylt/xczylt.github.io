<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 语音助手</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --green:#07C160;--green-dk:#06AD56;
      --bg:#EDEDED;--chat-bg:#F5F5F5;--header:#EFEFF4;
      --bub-me:#95EC69;--bub-ai:#FFFFFF;
      --t1:#191919;--t2:#888;--t3:#AAA;
      --online:#35C759;--busy:#FF9500;--offline:#AAA;
      --red:#FF3B30;
    }
    body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

    .phone{width:390px;height:844px;background:var(--chat-bg);border-radius:40px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.08);position:relative}

    /* 状态栏 */
    .sbar{height:44px;background:var(--header);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
    .sbar .t{font-size:15px;font-weight:600;color:var(--t1)}
    .sbar .icons{display:flex;gap:6px;align-items:center}

    /* 顶部 */
    .hdr{background:var(--header);border-bottom:.5px solid rgba(0,0,0,.1);padding:10px 16px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0}
    .back{color:#007AFF;font-size:17px;cursor:pointer;display:flex;align-items:center;gap:2px}
    .ai-info{flex:1;display:flex;flex-direction:column;align-items:center}
    .ai-name{font-size:17px;font-weight:500;color:var(--t1)}
    .ai-status{font-size:11px;display:flex;align-items:center;gap:4px;margin-top:2px}
    .sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .sdot.on{background:var(--online)}
    .sdot.busy{background:var(--busy);animation:pulse 1.5s infinite}
    .sdot.off{background:var(--offline)}
    .st-on{color:var(--online)}.st-busy{color:var(--busy)}.st-off{color:var(--offline)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .more{color:var(--t1);cursor:pointer;padding:4px}
    .ai-av{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;flex-shrink:0}

    /* 消息区 */
    .msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
    .msgs::-webkit-scrollbar{width:4px}
    .msgs::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px}

    .ts{text-align:center;font-size:11px;color:var(--t3);margin:4px 0}

    .mrow{display:flex;align-items:flex-end;gap:8px;animation:fadeIn .25s ease}
    .mrow.me{flex-direction:row-reverse}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .mav{width:38px;height:38px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .mav.ai{background:linear-gradient(135deg,#667eea,#764ba2)}
    .mav.me{background:linear-gradient(135deg,#4facfe,#00f2fe);font-size:16px;font-weight:600;color:#fff}

    .bwrap{max-width:65%;display:flex;flex-direction:column}
    .mrow.me .bwrap{align-items:flex-end}

    .bub{padding:9px 13px;font-size:16px;line-height:1.5;word-break:break-all;position:relative}
    .bub.ai{background:var(--bub-ai);border-radius:4px 12px 12px 12px;color:var(--t1);box-shadow:0 1px 2px rgba(0,0,0,.08)}
    .bub.me{background:var(--bub-me);border-radius:12px 4px 12px 12px;color:var(--t1)}

    /* 语音气泡 */
    .vbub{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;min-width:80px}
    .vbtn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .ai .vbtn{background:rgba(7,193,96,.12)}.ai .vbtn svg{color:var(--green)}
    .me .vbtn{background:rgba(0,0,0,.1)}.me .vbtn svg{color:rgba(0,0,0,.5)}
    .waves{display:flex;align-items:center;gap:3px}
    .wbar{width:3px;border-radius:2px;background:var(--t3);transition:height .1s}
    .me .wbar{background:rgba(0,0,0,.3)}
    .vdur{font-size:13px;color:var(--t2);flex-shrink:0}

    /* typing */
    .typing{display:flex;align-items:center;gap:4px;padding:10px 14px;min-width:56px}
    .tdot{width:7px;height:7px;border-radius:50%;background:var(--t3);animation:tb 1.2s infinite}
    .tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
    @keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

    /* 输入区 */
    .iarea{background:var(--header);border-top:.5px solid rgba(0,0,0,.1);padding:8px 12px 20px;flex-shrink:0}
    .qtags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
    .qtag{padding:5px 12px;border-radius:16px;background:#fff;border:.5px solid rgba(0,0,0,.12);font-size:13px;color:#444;cursor:pointer;transition:background .15s;user-select:none}
    .qtag:hover{background:rgba(7,193,96,.08);border-color:var(--green);color:var(--green)}
    .irow{display:flex;align-items:flex-end;gap:8px}
    .ibtn{width:36px;height:36px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#555;flex-shrink:0;transition:background .15s}
    .ibtn:hover{background:rgba(0,0,0,.06)}
    .ibtn svg{width:24px;height:24px}
    .twrap{flex:1;background:#fff;border-radius:8px;border:.5px solid rgba(0,0,0,.12);min-height:36px;max-height:120px;display:flex;align-items:center;overflow:hidden}
    .tinput{width:100%;border:none;outline:none;padding:8px 10px;font-size:16px;font-family:inherit;resize:none;min-height:36px;max-height:120px;background:transparent;color:var(--t1);line-height:1.4}
    .vrec{flex:1;height:36px;background:#fff;border-radius:8px;border:.5px solid rgba(0,0,0,.12);font-size:16px;color:var(--t1);cursor:pointer;display:none;align-items:center;justify-content:center;gap:8px;user-select:none;transition:background .15s}
    .vrec.active{background:rgba(255,59,48,.08);border-color:var(--red)}
    .rdot{width:8px;height:8px;border-radius:50%;background:var(--red)}
    .vrec.active .rdot{animation:pulse .8s infinite}
    .sbtn{width:36px;height:36px;border-radius:8px;border:none;background:var(--green);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;transition:background .15s,transform .1s}
    .sbtn:hover{background:var(--green-dk)}.sbtn:active{transform:scale(.92)}
    .sbtn svg{width:18px;height:18px}

    /* 录音遮罩 */
    .rec-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:10;border-radius:40px}
    .rec-overlay.show{display:flex}
    .rec-ring{width:90px;height:90px;border-radius:50%;border:3px solid var(--red);display:flex;align-items:center;justify-content:center;position:relative}
    .rec-ring::before{content:'';position:absolute;inset:6px;border-radius:50%;background:rgba(255,59,48,.2);animation:rp 1s infinite}
    @keyframes rp{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.1);opacity:.4}}
    .rec-hint{color:#fff;font-size:15px}.rec-sub{color:rgba(255,255,255,.6);font-size:13px}

    /* 状态面板 */
    .spanel{position:absolute;top:100px;right:16px;background:#fff;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.15);padding:8px 0;z-index:20;display:none;min-width:140px}
    .spanel.show{display:block;animation:drop .2s ease}
    @keyframes drop{from{opacity:0;transform:translateY(-8px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    .sopt{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:14px;color:var(--t1);transition:background .1s}
    .sopt:hover{background:rgba(0,0,0,.04)}.sopt.cur{color:var(--green);font-weight:500}
    .sopt .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

    /* 波形播放 */
    @keyframes wa{0%,100%{height:4px}50%{height:16px}}
    .wbar.playing{background:var(--green)!important}
    .wbar.playing:nth-child(1){animation:wa .6s infinite 0s}
    .wbar.playing:nth-child(2){animation:wa .6s infinite .1s}
    .wbar.playing:nth-child(3){animation:wa .6s infinite .2s}
    .wbar.playing:nth-child(4){animation:wa .6s infinite .15s}
    .wbar.playing:nth-child(5){animation:wa .6s infinite .05s}

    /* 设置面板 */
    .settings-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:30;display:none;align-items:flex-end;border-radius:40px}
    .settings-overlay.show{display:flex;animation:fadeIn .2s ease}
    .settings-box{background:#fff;width:100%;border-radius:20px 20px 0 0;padding:20px 20px 32px;max-height:80%;overflow-y:auto}
    .settings-box h3{font-size:16px;font-weight:500;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
    .settings-box h3 .close-s{cursor:pointer;color:var(--t2);font-size:20px;line-height:1}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:13px;color:var(--t2);margin-bottom:5px}
    .field input,.field select{width:100%;padding:9px 12px;border:.5px solid rgba(0,0,0,.2);border-radius:8px;font-size:14px;outline:none;font-family:inherit;color:var(--t1)}
    .field input:focus,.field select:focus{border-color:var(--green)}
    .save-btn{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;margin-top:4px;font-family:inherit}
    .save-btn:hover{background:var(--green-dk)}
    .tip{font-size:12px;color:var(--t3);margin-top:8px;line-height:1.6}
    .api-status{font-size:12px;margin-top:6px;padding:6px 10px;border-radius:6px;display:none}
    .api-status.ok{background:rgba(7,193,96,.1);color:var(--green);display:block}
    .api-status.err{background:rgba(255,59,48,.1);color:var(--red);display:block}

    /* 流式文字光标 */
    .cursor{display:inline-block;width:2px;height:1em;background:var(--t2);vertical-align:text-bottom;animation:blink .8s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    /* TTS 状态 */
    .tts-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--t2);margin-top:4px;padding:2px 8px;background:rgba(0,0,0,.05);border-radius:10px;cursor:pointer}
    .tts-badge.playing{color:var(--green);background:rgba(7,193,96,.08)}
  </style>
</head>
<body>
<div class="phone" id="app">

  <!-- 状态栏 -->
  <div class="sbar">
    <span class="t" id="clock">12:09</span>
    <div class="icons">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="4" width="3" height="12" rx="1"/><rect x="4.5" y="2.5" width="3" height="13.5" rx="1"/><rect x="9" y="1" width="3" height="15" rx="1"/><rect x="13.5" y="0" width="2.5" height="16" rx="1"/></svg>
      <svg width="16" height="16" viewBox="0 0 25 12" fill="currentColor"><rect x="0" y="0" width="22" height="12" rx="3" stroke="currentColor" stroke-width="1" fill="none"/><rect x="1.5" y="1.5" width="16" height="9" rx="2"/><rect x="23" y="3.5" width="2" height="5" rx="1" opacity=".4"/></svg>
    </div>
  </div>

  <!-- 顶栏 -->
  <div class="hdr">
    <div class="back">
      <svg width="12" height="20" viewBox="0 0 12 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,2 2,10 10,18"/></svg>
      <span>返回</span>
    </div>
    <div class="ai-info">
      <span class="ai-name">AI 语音助手</span>
      <div class="ai-status" id="statusLabel">
        <div class="sdot on" id="sdot"></div>
        <span class="st-on" id="stxt">在线</span>
      </div>
    </div>
    <div style="display:flex;gap:4px">
      <div class="ibtn" id="settingsBtn" title="API 设置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </div>
      <div class="more ibtn" id="moreBtn">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="currentColor"><circle cx="11" cy="5" r="1.8"/><circle cx="11" cy="11" r="1.8"/><circle cx="11" cy="17" r="1.8"/></svg>
      </div>
    </div>
  </div>

  <!-- 状态面板 -->
  <div class="spanel" id="spanel">
    <div class="sopt cur" data-s="online"><div class="dot" style="background:var(--online)"></div>在线</div>
    <div class="sopt" data-s="busy"><div class="dot" style="background:var(--busy)"></div>忙碌中</div>
    <div class="sopt" data-s="offline"><div class="dot" style="background:var(--offline)"></div>离线</div>
  </div>

  <!-- 消息区 -->
  <div class="msgs" id="msgs">
    <div class="ts" id="initTs"></div>
    <div class="mrow">
      <div class="mav ai">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M8 8a4 4 0 018 0"/><path d="M7 17c0-2.8 2.24-5 5-5s5 2.2 5 5"/><path d="M3 21c0-4.4 4-8 9-8s9 3.6 9 8"/></svg>
      </div>
      <div class="bwrap">
        <div class="bub ai">你好！我是你的 AI 语音助手 ✨<br>我可以联网回答你的问题，包括最新新闻、实时信息。<br><br>⚙️ 点右上角齿轮配置你的 AI API Key 即可开始！</div>
      </div>
    </div>
  </div>

  <!-- 输入区 -->
  <div class="iarea">
    <div class="qtags">
      <div class="qtag" onclick="sendQ(this)">今日热点新闻</div>
      <div class="qtag" onclick="sendQ(this)">现在几点</div>
      <div class="qtag" onclick="sendQ(this)">讲个笑话</div>
      <div class="qtag" onclick="sendQ(this)">推荐一首歌</div>
    </div>
    <div class="irow">
      <button class="ibtn" id="vmodeBtn" onclick="toggleVM()">
        <svg id="vmodeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10c0 3.87 3.13 7 7 7s7-3.13 7-7"/><line x1="12" y1="17" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
      </button>
      <div class="twrap" id="twrap">
        <textarea class="tinput" id="tinput" placeholder="发送消息…" rows="1"
          oninput="autoR(this)" onkeydown="onKey(event)"></textarea>
      </div>
      <button class="vrec" id="vrec" onmousedown="recStart()" onmouseup="recStop()" ontouchstart="recStart(event)" ontouchend="recStop()">
        <div class="rdot"></div><span id="rbtxt">按住 说话</span>
      </button>
      <button class="ibtn" onclick="toggleEmoji()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      </button>
      <button class="sbtn" id="sbtn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
      </button>
    </div>
  </div>

  <!-- 录音遮罩 -->
  <div class="rec-overlay" id="recOverlay">
    <div class="rec-ring">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#FF3B30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10c0 3.87 3.13 7 7 7s7-3.13 7-7"/><line x1="12" y1="17" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
    </div>
    <div class="rec-hint" id="recHint">正在录音…</div>
    <div class="rec-sub">松开发送，上滑取消</div>
  </div>

  <!-- 设置面板 -->
  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-box">
      <h3>API 设置 <span class="close-s" onclick="closeSettings()">×</span></h3>

      <div class="field">
        <label>API 提供商</label>
        <select id="apiProvider" onchange="onProviderChange()">
          <option value="openai">OpenAI (gpt-4o / gpt-4o-mini)</option>
          <option value="deepseek">DeepSeek (deepseek-chat)</option>
          <option value="moonshot">Moonshot / Kimi (moonshot-v1-8k)</option>
          <option value="zhipu">智谱 GLM (glm-4-flash)</option>
          <option value="qwen">通义千问 (qwen-plus)</option>
          <option value="custom">自定义 Endpoint</option>
        </select>
      </div>

      <div class="field">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="sk-…">
      </div>

      <div class="field" id="customEndpointField" style="display:none">
        <label>自定义 API 地址</label>
        <input type="text" id="customEndpoint" placeholder="https://your-api/v1">
      </div>

      <div class="field" id="modelField">
        <label>模型名称</label>
        <input type="text" id="modelName" placeholder="gpt-4o-mini">
      </div>

      <div class="field">
        <label>系统提示词（可选）</label>
        <input type="text" id="sysPrompt" placeholder="你是一个聪明的AI助手，了解最新资讯…">
      </div>

      <div class="field">
        <label>语音播报</label>
        <select id="ttsMode">
          <option value="browser">浏览器 TTS（免费）</option>
          <option value="off">关闭</option>
        </select>
      </div>

      <button class="save-btn" onclick="saveSettings()">保存并开始对话</button>
      <div class="api-status" id="apiStatus"></div>
      <div class="tip">
        💡 推荐使用 <b>DeepSeek</b>（超低价格，支持联网搜索）或 <b>Moonshot/Kimi</b>（支持搜索插件）。<br>
        API Key 仅保存在本地浏览器，不会上传到任何服务器。
      </div>
    </div>
  </div>
</div>

<script>
// ── 配置 ──────────────────────────────────────────
const PROVIDERS = {
  openai:   { base: 'https://api.openai.com/v1', model: 'gpt-4o-mini' },
  deepseek: { base: 'https://api.deepseek.com/v1', model: 'deepseek-chat' },
  moonshot: { base: 'https://api.moonshot.cn/v1', model: 'moonshot-v1-8k' },
  zhipu:    { base: 'https://open.bigmodel.cn/api/paas/v4', model: 'glm-4-flash' },
  qwen:     { base: 'https://dashscope.aliyuncs.com/compatible-mode/v1', model: 'qwen-plus' },
  custom:   { base: '', model: '' }
};

let cfg = {
  provider: 'deepseek',
  apiKey: '',
  endpoint: '',
  model: 'deepseek-chat',
  sysPrompt: '你是一个智能AI助手，具备联网搜索能力，了解当前最新资讯和新闻。请用中文回答，回复简洁自然。当前时间：' + new Date().toLocaleString('zh-CN'),
  ttsMode: 'browser'
};

const history = [];
let aiStatus = 'online';
let isGenerating = false;

// 加载本地存储
(function loadCfg() {
  try {
    const s = localStorage.getItem('ai_chat_cfg');
    if (s) Object.assign(cfg, JSON.parse(s));
  } catch(e){}
  // 同步到表单
  document.getElementById('apiProvider').value = cfg.provider;
  document.getElementById('apiKey').value = cfg.apiKey;
  document.getElementById('modelName').value = cfg.model;
  document.getElementById('sysPrompt').value = cfg.sysPrompt;
  document.getElementById('ttsMode').value = cfg.ttsMode;
  if (cfg.provider === 'custom') {
    document.getElementById('customEndpointField').style.display = 'block';
    document.getElementById('customEndpoint').value = cfg.endpoint;
  }
  updateClock();
})();

// ── 文本自适应高度 ────────────────────────────────
function autoR(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }

// ── 滚动 ─────────────────────────────────────────
function scrollB() {
  const m = document.getElementById('msgs');
  requestAnimationFrame(() => m.scrollTop = m.scrollHeight);
}

// ── HTML 转义 ─────────────────────────────────────
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── AI 头像 HTML ──────────────────────────────────
const AI_AV = `<div class="mav ai"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M8 8a4 4 0 018 0"/><path d="M7 17c0-2.8 2.24-5 5-5s5 2.2 5 5"/><path d="M3 21c0-4.4 4-8 9-8s9 3.6 9 8"/></svg></div>`;

// ── 发送消息 ──────────────────────────────────────
function sendQ(el) { sendMsg(el.textContent); }

async function sendMsg(text) {
  if (!cfg.apiKey) {
    addTs();
    addAIBub('⚙️ 请先点击右上角齿轮图标，填写你的 API Key。');
    document.getElementById('settingsOverlay').classList.add('show');
    return;
  }
  if (aiStatus === 'offline') { offlineHint(); return; }
  if (isGenerating) return;

  const inp = document.getElementById('tinput');
  const msg = text || inp.value.trim();
  if (!msg) return;
  if (!text) { inp.value = ''; inp.style.height = 'auto'; }

  addUserBub(msg);
  history.push({ role: 'user', content: msg });
  if (history.length > 20) history.splice(0, history.length - 20);

  if (aiStatus === 'busy') {
    addTs('稍后回复');
    setTimeout(() => doAIReply(), 3000);
  } else {
    doAIReply();
  }
}

function addTs(label) {
  const msgs = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'ts';
  d.textContent = label || ('今天 ' + document.getElementById('clock').textContent);
  msgs.appendChild(d);
}

function addUserBub(text) {
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'mrow me';
  row.innerHTML = `
    <div class="mav me">我</div>
    <div class="bwrap"><div class="bub me">${esc(text)}</div></div>`;
  msgs.appendChild(row);
  scrollB();
}

function addTyping() {
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'mrow'; row.id = 'typingRow';
  row.innerHTML = AI_AV + `<div class="bwrap"><div class="bub ai"><div class="typing"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div></div>`;
  msgs.appendChild(row);
  scrollB();
}
function rmTyping() {
  const r = document.getElementById('typingRow');
  if (r) r.remove();
}

function addAIBub(text, streaming = false) {
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'mrow'; row.id = 'aiRow';
  const txt = streaming ? '' : esc(text);
  row.innerHTML = AI_AV + `<div class="bwrap"><div class="bub ai" id="aiBub">${txt}${streaming ? '<span class="cursor"></span>' : ''}</div></div>`;
  msgs.appendChild(row);
  scrollB();
  return document.getElementById('aiBub');
}

async function doAIReply() {
  if (isGenerating) return;
  isGenerating = true;
  setStatus('busy');
  addTyping();

  try {
    const base = cfg.provider === 'custom' ? cfg.endpoint : (PROVIDERS[cfg.provider]?.base || cfg.endpoint);
    const url = base.replace(/\/$/, '') + '/chat/completions';
    const messages = [
      { role: 'system', content: cfg.sysPrompt + '\n当前时间：' + new Date().toLocaleString('zh-CN') },
      ...history
    ];

    const resp = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + cfg.apiKey
      },
      body: JSON.stringify({
        model: cfg.model,
        messages,
        stream: true,
        temperature: 0.7
      })
    });

    if (!resp.ok) {
      const errBody = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${errBody}`);
    }

    rmTyping();
    const bub = addAIBub('', true);
    let full = '';

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        const l = line.trim();
        if (!l || l === 'data: [DONE]') continue;
        if (!l.startsWith('data: ')) continue;
        try {
          const j = JSON.parse(l.slice(6));
          const delta = j.choices?.[0]?.delta?.content || '';
          if (delta) {
            full += delta;
            bub.innerHTML = esc(full) + '<span class="cursor"></span>';
            scrollB();
          }
        } catch(e){}
      }
    }

    // 移除光标
    bub.innerHTML = esc(full);
    history.push({ role: 'assistant', content: full });

    // TTS
    if (cfg.ttsMode === 'browser' && full) {
      speakBrowser(full, bub.parentElement);
    }

  } catch(err) {
    rmTyping();
    const msg = err.message.includes('401') ? '❌ API Key 无效，请在设置中检查。'
               : err.message.includes('429') ? '❌ 请求过于频繁，请稍后再试。'
               : err.message.includes('Failed to fetch') ? '❌ 网络错误或 CORS，请检查 API 地址。'
               : '❌ 请求失败：' + err.message;
    addAIBub(msg);
  } finally {
    isGenerating = false;
    setStatus('online');
  }
}

// ── TTS 浏览器 ────────────────────────────────────
let ttsUtter = null;
function speakBrowser(text, bubWrap) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g, ''));
  u.lang = 'zh-CN';
  u.rate = 1.05;
  ttsUtter = u;

  // 添加播放标记
  const badge = document.createElement('div');
  badge.className = 'tts-badge playing';
  badge.innerHTML = '🔊 正在播报';
  badge.onclick = () => { window.speechSynthesis.cancel(); badge.remove(); };
  bubWrap.appendChild(badge);

  u.onend = () => { badge.className = 'tts-badge'; badge.innerHTML = '🔈 重新播报'; badge.onclick = () => speakBrowser(text, bubWrap); };
  u.onerror = () => badge.remove();
  window.speechSynthesis.speak(u);
}

// ── 语音识别录音 ──────────────────────────────────
let recognition = null;
let isRecognizing = false;
let recTimer = null;

function recStart(e) {
  if (e) e.preventDefault();
  if (aiStatus === 'offline') { offlineHint(); return; }
  document.getElementById('recOverlay').classList.add('show');
  document.getElementById('vrec').classList.add('active');
  let sec = 0;
  recTimer = setInterval(() => {
    sec++;
    document.getElementById('recHint').textContent = `正在录音 ${sec}s`;
  }, 1000);

  if (window.SpeechRecognition || window.webkitSpeechRecognition) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'zh-CN';
    recognition.interimResults = false;
    recognition.continuous = false;
    recognition.onresult = e => {
      const txt = e.results[0][0].transcript;
      if (txt) sendMsg(txt);
    };
    recognition.onerror = () => {};
    recognition.start();
    isRecognizing = true;
  } else {
    document.getElementById('recHint').textContent = '浏览器不支持语音识别，请改用 Chrome';
  }
}

function recStop() {
  clearInterval(recTimer);
  document.getElementById('recOverlay').classList.remove('show');
  document.getElementById('vrec').classList.remove('active');
  document.getElementById('recHint').textContent = '正在录音…';
  document.getElementById('rbtxt').textContent = '按住 说话';
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  isRecognizing = false;
}
